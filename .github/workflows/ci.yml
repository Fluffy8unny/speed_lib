name: CMake Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CC: gcc-14
      CXX: g++-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-14 g++-14 libgtest-dev

      - name: Show compiler
        run: |
          $CC --version
          $CXX --version

      - name: Configure
        run: cmake -S . -B build -G Ninja -DBUILD_TESTING=ON -DCMAKE_C_COMPILER=$CC -DCMAKE_CXX_COMPILER=$CXX

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build/tests --output-on-failure
